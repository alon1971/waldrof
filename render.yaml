services:
  - type: web
    name: waldrof
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
