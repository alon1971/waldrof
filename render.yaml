services:
  - type: web
    name: waldrof
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: SUPABASE_URI
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: BILLING_REPORT_EMAIL
        value: Waldorfplanner@gmail.com

  - type: cron
    name: waldrof-billing-report
    runtime: node
    schedule: "0 8 1 * *"
    buildCommand: npm install
    startCommand: curl -fsS -H "Authorization: Bearer $CRON_SECRET" "https://waldrof.onrender.com/api/cron/billing-report"
    envVars:
      - key: CRON_SECRET
        sync: false
